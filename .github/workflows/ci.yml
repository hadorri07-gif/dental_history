name: Dental History CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  smart-contract:
    name: Smart Contract Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli@26.1.0

      - name: Run smart contract tests
        run: cargo test

      - name: Build smart contract
        run: stellar contract build

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: smart-contract

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and build TypeScript bindings
        working-directory: packages/dental_history
        run: |
          npm install
          npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build